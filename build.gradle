plugins {
	id 'net.fabricmc.fabric-loom' version '1.15.+'
	id 'maven-publish'
	id "com.modrinth.minotaur" version "2.+"
	id 'com.matthewprenger.cursegradle' version '1.4.0'
}

base {
	archivesName = project.archives_base_name
}
version = project.mod_version + "+" + project.minecraft_version
group = project.maven_group

loom {
	accessWidenerPath = file("src/main/resources/polydex.accesswidener")
}

repositories {
	maven { url = "https://maven.fabricmc.net/" }
	maven { url = "https://maven.nucleoid.xyz/releases/" }
	maven { url = 'https://jitpack.io' }
	maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
	maven { url 'https://maven.blamejared.com' }
	maven { url "https://maven.shedaniel.me" }

	maven {
		name = "TerraformersMC"
		url = "https://maven.terraformersmc.com/"
	}

	maven {
		url = "https://maven.jamieswhiteshirt.com/libs-release/"
		content {
			includeGroup 'com.jamieswhiteshirt'
		}
	}

	maven {
		name = "AlexIIL"
		url = "https://maven.alexiil.uk/"
	}

	maven {
		url "https://www.cursemaven.com"
		content {
			includeGroup "curse.maven"
		}
	}

	maven { url = 'https://api.modrinth.com/maven' }

	mavenLocal()
}

dependencies {
	//to change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	// Server side stuff
	implementation include("eu.pb4:sgui:${project.sgui_version}")
	implementation include("eu.pb4:polymer-resource-pack:${project.polymer_version}")
	implementation include("eu.pb4:polymer-resource-pack-extras:${project.polymer_version}")
	implementation include("eu.pb4:placeholder-api:${project.placeholder_version}")
	implementation include("eu.pb4:predicate-api:${project.predicate_version}")
	implementation include("eu.pb4:player-data-api:${project.player_data_version}")
	implementation include("eu.pb4:sidebar-api:${project.sidebar_version}")
	implementation include("xyz.nucleoid:server-translations-api:${project.stapi_version}")

	compileOnly "eu.pb4:polymer-core:${project.polymer_version}"
	localRuntime "eu.pb4:polymer-autohost:${project.polymer_version}"
	//modCompileOnly "dev.emi:emi-fabric:1.0.10+1.20.1"


	//modLocalRuntime 'maven.modrinth:goml-reserved:1.5.0-beta.1'
	//modLocalRuntime 'maven.modrinth:polymer-ports-waystones:2.4.1-polymerport.2'
}

processResources {
	inputs.property "version", project.version

	filesMatching('fabric.mod.json') {
		expand "version": project.version
	}
}

// ensure that the encoding is set to UTF-8, no matter what the system default is
// this fixes some edge cases with special characters not displaying correctly
// see http://yodaconditions.net/blog/fix-for-java-file-encoding-problems-with-gradle.html
tasks.withType(JavaCompile) {
	options.encoding = "UTF-8"
}

jar {
	from "LICENSE"
}
def env = System.getenv()

// configure the maven publication
publishing {
	publications {
		mavenJava(MavenPublication) {
			mavenJava(MavenPublication) {
				groupId = rootProject.maven_group
				artifactId = project.archives_base_name
				version = project.version

				from components.java
			}
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
		repositories {
			if (env.MAVEN_URL) {
				maven {
					credentials {
						username env.MAVEN_USERNAME
						password env.MAVEN_PASSWORD
					}
					url env.MAVEN_URL
				}
			} else {
				mavenLocal()
			}
		}
	}
}


curseforge {
	if (System.getenv("CURSEFORGE")) {
		apiKey = System.getenv("CURSEFORGE")

		project {
			id = "580643"
			releaseType = "release"
			changelog = System.getenv("CHANGELOG")
			changelogType = "markdown"
			addGameVersion((project.minecraft_version.contains("-") ? ((String) project.minecraft_version.split("-")[0] + "-snapshot") : project.minecraft_version))
			addGameVersion "Fabric"
			mainArtifact(jar.archiveFile)

			afterEvaluate {
				uploadTask.dependsOn("jar")
			}
		}
	}

	options {
		forgeGradleIntegration = false
	}

	jar {
		finalizedBy project.tasks.curseforge
	}
}

if (System.getenv("MODRINTH")) {
	modrinth {
		token = System.getenv("MODRINTH")
		projectId = 'm5NB7FJE'
		versionNumber = "" + version
		changelog = System.getenv("CHANGELOG")
		// On fabric, use 'remapJar' instead of 'jar'
		uploadFile = jar
		gameVersions = [((String) project.minecraft_version)]
		loaders = ["fabric"]
	}

	jar {
		finalizedBy project.tasks.modrinth
	}
}
